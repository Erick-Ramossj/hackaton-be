version: '3.8'

# ============================================================
# EC2: SUBRED PRIVADA — Backend
# Solo necesitas subir ESTE archivo a la EC2.
# No necesitas código fuente — descarga la imagen de Docker Hub.
#
# ANTES DE LEVANTAR: reemplaza los dos placeholders:
#   TU_USUARIO        → tu usuario de Docker Hub
#   IP_PRIVADA_BD     → IP privada de la EC2 donde corre SQL Server
#
# Comando para levantar:
#   docker compose up -d
# ============================================================

services:

  backend:
    image: erickramoss/hackaton-backend:latest
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://IP_PRIVADA_BD:1433;databaseName=TechStore;encrypt=true;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "TechStore_2026!"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.SQLServerDialect"
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SERVER_PORT: "8080"
    restart: unless-stopped
