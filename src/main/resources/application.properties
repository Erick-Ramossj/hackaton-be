# ==========================================
# CONEXION A SQL SERVER
# Cambia el password segun tu entorno
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TechStore;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:TechStore_2026!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# JPA / HIBERNATE
# none: no toca la BD, solo usa lo que ya existe
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.main.allow-bean-definition-overriding=true

# ==========================================
# SERVIDOR
# ==========================================
server.port=8080

# ==========================================
# TAMANIO MAXIMO DE ARCHIVOS (importacion)
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
